<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com vetores</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

    <header>
        <h1>Google Charts</h1>

    </header>

    <nav>

    </nav>


    <main>

        <form action="">
            <label for="">Valor de X</label>
            <input type="number" id="v1" />

            <a href="#" onclick="executar()">Executar</a>


        </form>

        <div id="chart_div"></div>
        <div id="media"></div>


        <script src="vetores.js"></script>
        <script>
            const executar = () =>{
                const x = eval(document.getElementById("v1").value);
                addValor(x);

                google.charts.load('current', {packages: ['corechart',  'line']});
                google.charts.setOnLoadCallback(drawBasic);
                document.getElementById("media").innerHTML = 'Media: ${media()}';
                
            }
        </script>

    </main>


    <footer>


    </footer>
    
</body>
</html>
