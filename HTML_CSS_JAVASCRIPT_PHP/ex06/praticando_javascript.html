<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>    
</head>
<body>
    <header>
        <h1><strong>Atividade Prática - Exercicio 1º</strong></h1>
        <p>Realizaremos a criação de uma programação de calculo de soma.</p>
    </header>

    <main>
        <article>
            <script type="text/javascript">

                var numero1 = prompt("Insira o primero número: ", int);
                var numero2 = prompt("Insira o segundo número: ", int);

                var resultadoSoma = soma(numero1, numero2);
                alert('O resultado do somatório entre os números é igual à: ' + resultadoSoma);

                function soma(numero1, numero2){
                    var resultado = 0;
                    resultado = numero1 + numero2;
                    return resultado;
                }

                
            </script>

        </article>
    </main>
    
</body>
</html>
