<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <script src="funcoes.js"></script>
</head>
<body>
    <form>
        <label for="valorA">ValorA</label>
        <input type="number" id="v1"/>

        <label for="valorB">ValorB</label>
        <input type="number" id="v2"/>

        <label for="operação">Operação</label>

        <select name="" id="oper">
            <option value="soma">Soma</option>
            <option value="subtrair">Subtração</option>
            <option value="multiplicar">Multiplicação</option>
            <option value="dividir">Divisão</option>
            <option value="exponencial">Potência</option>
        </select>

        <a href="javascript.html" onclick="executar()">Executar</a>

    </form>

        <div id="resp">O resultado aparece aqui</div>

        <script src="funcoes.js"></script>

        <script>
            const executar =  () => {
                const a = eval(document.getElementById("v1").value);
                const b = eval(document.getElementById("v2").value);
                let oper = eval(document.getElementById("oper").selectedIndex);
                
                let resultado = (oper == 0)?somar(a,b):(oper == 1)?substrair(a,b):
                   (oper == 2)?multiplicar(a,b):(oper == 3)?dividir(a,b):exponencial(a,b);

                document.getElementById("resp").innerHTML = 
                   'O resultado da operação é: ${resultado}';

            }
        </script>
</body>
</html>
