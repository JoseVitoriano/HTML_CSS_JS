<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estruturas condicionais</title>
</head>
<body>

    <header>
        <h1>Estrutrura</h1>
    </header>

    <main>
        <p>Apresenta <strong>"Bom dia"</strong> se for menos que <strong>12:00</strong>.</p>
        <p id="demo"> já passou de meio-dia.</p>
    </main>

    <script>
        if(new Date().getHours() < 12){
            document.getElementById("demo").innerHTML = "Bom dia!"
        }
    </script>

    
</body>
</html>
