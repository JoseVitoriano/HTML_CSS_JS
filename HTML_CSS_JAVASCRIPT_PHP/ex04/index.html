<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <form action="index.html" method="post">
        <fieldset>
            <legend>Dados Gerais</legend>
            <label for="nome">Nome:</label>
            <input type="text" minlength="3" id="nome" required>
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="text" id="data_nascimento" required>
            <label for="cpf">CPF:</label>
            <input type="cpf" minlength="11" id="cpf" required>
        </fieldset>

        <fieldset>
            <legend>Endereço</legend>
            <label for="tipo_endereço">Tipo:</label>
            <select name="" id="tipo_endereço">
                <option value="">Selecione</option>
                <option value="">Rua</option>
                <option value="">Estrada</option>
                <option value="">Rodovia</option>
                <option value="">Outros</option>
            </select>
            <label for="logradouro_endereço">Logradouro:</label>
            <input type="text" id="logradouro_endereço" required>
            <label for="numero_endereço">Número:</label>
            <input type="text" id="numero_endereço" required>
            <label for="complemento_endereço">Complemento:</label>
            <input type="text" id="complemento_endereço" required>
        </fieldset>

        <fieldset>
            <legend>Fale Conosco</legend>
            <label for="msg">Mensagem:</label>
            <textarea name="" type="text" id="msg" cols="30" rows="4"></textarea>
        </fieldset>

        <fieldset>
            <button type="submit">Enviar sua mensagem:</button>
            <button type="reset">Limpar Formulario:</button>
        </fieldset>    

    </form>
    
</body>
</html>
