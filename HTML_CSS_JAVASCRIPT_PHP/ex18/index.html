<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação de Vetores</title>
</head>
<body>

    <script>
        const bubble = (v) =>{
            let ordenado = false;

            while(!ordenado){
                ordenado = true;

                for(let i=1; i<v.length; i++)
                    if(v[i-1] > v[i]){

                        const aux = v[i];
                        v[i] = v[i-1];
                        v[i - 1] = aux;
                        ordenado = false;
                    }

            }
        
        }

    </script>
    
</body>
</html>
