<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
</head>
<body>
    <header>
        <h1><strong>Calculadora de I.M.C.</strong></h1>
        <br>
    </header>

    <main>
        <form action="">
            <label for="">Peso (KG):</label>
            <input type="number" id="v1"/>
            <br>
            <br>
            <label for="">Altura (M):</label>
            <input type="number" id="v2"/>
            <br>
            <br>
            <a href="#" onclick="executar()">Executar</a>
        </form>

        <script src="calculo_imc.js"></script>
        <script>

            const executar = () => {
                const peso = eval(document.getElementById("v1").value);
                const altura = eval(document.getElementById("v2").value);
                const v_imc = imc(peso, altura);
                const v_sit = situacao(v_imc);
                alert('IMC: ${v_imc.toFixed(2)}:: Situação: ${v_sit}');
            }
        </script>



    </main>
    
</body>
</html>
