<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Alternando Imagens</title>
</head>
<body>
    <main>
        <article>
            <h1><strong>Utilizando linguagem de programação JavaScript !</strong></h1>
            <hr>
            <h2>Interação ao Usuário.</h2>
            <p>Utilize os botões abaixo para alternar a imagem.</p>

            <img id="imgApagada" src="imagens/lampada1.png" alt="width: 100px">
            <hr>

            <button onclick="document.getElementById('imgApagada').src ='./imagens/lampada2.png'">Acender</button>

            <button onclick="document.getElementById('imgApagada').src='./imagens/lampada1.png'">Apagar</button>

        </article>
    </main>
    
</body>
</html>
